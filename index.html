<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vibe Check — Curated Experiences</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020202">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020202; --fg: #ffffff; --card-bg: #111111; --border: #27272a; --muted: #71717a; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--fg); min-height: 100vh; overflow-x: hidden; padding-bottom: 100px; }
        #canvas-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.4; }
        .app-container { max-width: 500px; margin: 0 auto; padding: 2rem 1.5rem; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem; }
        .header h1 { font-size: 1.75rem; font-weight: 800; letter-spacing: -0.05em; }
        .streak-badge { background: var(--card-bg); border: 1px solid var(--border); padding: 0.5rem 1rem; font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; gap: 0.5rem; }
        .mood-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin-bottom: 2.5rem; }
        .mood-btn { background: var(--card-bg); border: 1px solid var(--border); color: var(--muted); padding: 0.75rem; font-size: 0.8rem; font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: 0.05em; }
        .mood-btn.active { background: var(--fg); color: var(--bg); border-color: var(--fg); }
        .vibe-ticket { background: var(--card-bg); border: 1px solid var(--border); margin-bottom: 1.5rem; display: none; }
        .vibe-ticket.visible { display: block; animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .ticket-header { padding: 1.5rem; border-bottom: 1px dashed var(--border); display: flex; justify-content: space-between; align-items: baseline; }
        .ticket-mood { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.75rem; }
        .ticket-body { padding: 1.5rem; }
        .ticket-label { font-size: 0.65rem; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; letter-spacing: 0.1em; }
        .ticket-content { font-size: 1.1rem; font-weight: 500; margin-bottom: 1.5rem; line-height: 1.4; }
        .palette-row { display: flex; gap: 0.5rem; margin-top: 1rem; }
        .mini-swatch { width: 24px; height: 24px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.1); }
        .deep-dive { background: rgba(255,255,255,0.03); border-left: 2px solid var(--fg); padding: 1rem; margin-top: 1.5rem; font-size: 0.9rem; color: var(--muted); font-family: 'Playfair Display', serif; font-style: italic; }
        .analytics-section { margin-top: 3rem; opacity: 0.7; }
        .analytics-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1rem; color: var(--muted); }
        .analytics-grid { display: grid; grid-template-columns: repeat(15, 1fr); gap: 3px; }
        .heatmap-day { aspect-ratio: 1; background: var(--card-bg); border-radius: 2px; }
        .heatmap-day.active { background: var(--fg); }
        .action-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 1.25rem; background: rgba(2,2,2,0.95); backdrop-filter: blur(16px); display: flex; gap: 1rem; justify-content: center; border-top: 1px solid var(--border); z-index: 100; }
        .btn { flex: 1; padding: 1rem; border: none; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--card-bg); color: var(--fg); font-size: 0.9rem; }
        .btn-primary { background: var(--fg); color: var(--bg); border-color: var(--fg); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        #export-canvas { display: none; }
    </style>
</head>
<body>
    <canvas id="canvas-bg"></canvas>
    <div class="app-container">
        <div class="header">
            <h1>VIBE CHECK</h1>
            <div class="streak-badge" id="streakBadge">🔥 <span id="streakCount">0</span></div>
        </div>
        <div class="mood-grid" id="moodGrid">
            <button class="mood-btn" data-mood="happy">Happy</button>
            <button class="mood-btn" data-mood="chill">Chill</button>
            <button class="mood-btn" data-mood="energetic">Energetic</button>
            <button class="mood-btn" data-mood="melancholy">Melancholy</button>
            <button class="mood-btn" data-mood="creative">Creative</button>
        </div>
        <div id="vibeStage"></div>
        <div class="analytics-section">
            <div class="analytics-label">Mood History</div>
            <div class="analytics-grid" id="analyticsGrid"></div>
        </div>
    </div>
    <div class="action-bar">
        <button class="btn" onclick="app.regenerate()">🎲 New Vibe</button>
        <button class="btn btn-primary" onclick="app.exportCard()">📸 Save Card</button>
    </div>
    <canvas id="export-canvas" width="1080" height="1350"></canvas>
    <script>
        const moodData = {
            happy: { activities: ["Take a spontaneous 15-min walk", "Call someone you miss", "Cook a new recipe"], music: ["Upbeat Indie Pop", "70s Funk", "Sunny Acoustic"], colors: ["#facc15", "#f87171", "#4ade80", "#ffffff"], quote: "Happiness is not by chance, but by choice.", dive: "Choosing joy is a radical act. Today, lean into the light." },
            chill: { activities: ["Read 10 pages of a book", "Brew the perfect cup of tea", "5-minute guided meditation"], music: ["Lo-fi Hip Hop", "Ambient Nature", "Slow Jazz"], colors: ["#4ade80", "#d9f99d", "#fed7aa", "#ffffff"], quote: "Quiet the mind, and the soul will speak.", dive: "In a world of noise, your peace is your power." },
            energetic: { activities: ["20-minute HIIT session", "Clean your entire workspace", "Sprint for 100 meters"], music: ["High-BPM Drum & Bass", "Rock Anthems", "Workout Trap"], colors: ["#ef4444", "#fdba74", "#facc15", "#ffffff"], quote: "Energy flows where attention goes.", dive: "You are a kinetic force. Don't let that energy go to waste." },
            melancholy: { activities: ["Write in a private journal", "Watch the rain from a window", "Listen to a sad album"], music: ["Piano Solos", "Indie Folk", "Rain Sounds"], colors: ["#3b82f6", "#60a5fa", "#818cf8", "#ffffff"], quote: "Tears are words that need to be written.", dive: "Sadness is just another form of depth. Let yourself feel it." },
            creative: { activities: ["Sketch for 15 minutes", "Write a short haiku", "Take 5 abstract photos"], music: ["Experimental Electronic", "Baroque Classical", "World Fusion"], colors: ["#a855f7", "#c084fc", "#e879f9", "#ffffff"], quote: "Creativity is intelligence having fun.", dive: "The world is waiting for what only you can create." }
        };

        class Particles {
            constructor() { this.c = document.getElementById('canvas-bg'); this.ctx = this.c.getContext('2d'); this.p = []; this.resize(); window.addEventListener('resize', () => this.resize()); this.animate(); }
            resize() { this.c.width = window.innerWidth; this.c.height = window.innerHeight; }
            setMood(m) {
                const cfg = { happy: {c:100, s:1.5, col:'#facc15'}, chill: {c:40, s:0.3, col:'#4ade80'}, energetic: {c:150, s:3, col:'#ef4444'}, melancholy: {c:60, s:0.5, col:'#60a5fa'}, creative: {c:80, s:1.2, col:'#c084fc'} }[m];
                this.p = []; for(let i=0; i<cfg.c; i++) this.p.push({x:Math.random()*this.c.width, y:Math.random()*this.c.height, vx:(Math.random()-0.5)*cfg.s, vy:(Math.random()-0.5)*cfg.s, s:Math.random()*2}); this.col = cfg.col;
            }
            animate() { this.ctx.clearRect(0,0,this.c.width,this.c.height); this.ctx.fillStyle = this.col; this.p.forEach(d => { d.x+=d.vx; d.y+=d.vy; if(d.x<0||d.x>this.c.width) d.vx*=-1; if(d.y<0||d.y>this.c.height) d.vy*=-1; this.ctx.beginPath(); this.ctx.arc(d.x,d.y,d.s,0,Math.PI*2); this.ctx.fill(); }); requestAnimationFrame(() => this.animate()); }
        }

        const History = {
            log: (m) => { let h = JSON.parse(localStorage.getItem('vibe_history')||'[]'); h.push({m, d: new Date().toISOString()}); if(h.length>30) h.shift(); localStorage.setItem('vibe_history', JSON.stringify(h)); History.render(); },
            render: () => { const g = document.getElementById('analyticsGrid'); const h = JSON.parse(localStorage.getItem('vibe_history')||'[]'); g.innerHTML=''; for(let i=0; i<30; i++) { const d=document.createElement('div'); d.className='heatmap-day'; if(h[i]) d.classList.add('active'); g.appendChild(d); } }
        };

        const app = {
            particles: new Particles(), currentMood: 'chill', currentVibe: null,
            init() { document.querySelectorAll('.mood-btn').forEach(b => b.addEventListener('click', e => this.setMood(e.target.dataset.mood))); History.render(); this.setMood('chill'); },
            setMood(m) { this.currentMood = m; document.querySelectorAll('.mood-btn').forEach(b => b.classList.toggle('active', b.dataset.mood === m)); this.particles.setMood(m); this.regenerate(); History.log(m); },
            regenerate() {
                const d = moodData[this.currentMood];
                this.currentVibe = { mood: m, activity: d.activities[Math.floor(Math.random()*d.activities.length)], music: d.music[Math.floor(Math.random()*d.music.length)], colors: d.colors, quote: d.quote, dive: d.dive, id: Math.random().toString(36).substring(2,6).toUpperCase() };
                document.getElementById('vibeStage').innerHTML = `
                    <div class="vibe-ticket visible">
                        <div class="ticket-header"><div class="ticket-mood">${this.currentVibe.mood}</div><div style="font-family:monospace; font-size:0.7rem; color:var(--muted)">ID: ${this.currentVibe.id}</div></div>
                        <div class="ticket-body">
                            <div class="ticket-label">Activity</div><div class="ticket-content">${this.currentVibe.activity}</div>
                            <div class="ticket-label">Soundscape</div><div class="ticket-content" style="font-family:'Playfair Display',serif; font-style:italic">${this.currentVibe.music}</div>
                            <div class="ticket-label">Mantra</div><div class="ticket-content" style="font-size:0.9rem; color:var(--muted)">"${this.currentVibe.quote}"</div>
                            <div class="deep-dive">${this.currentVibe.dive}</div>
                            <div class="palette-row">${this.currentVibe.colors.map(c=>`<div class="mini-swatch" style="background:${c}"></div>`).join('')}</div>
                        </div>
                    </div>`;
            },
            exportCard() {
                const c = document.getElementById('export-canvas'), ctx = c.getContext('2d');
                const v = this.currentVibe;
                // Background
                ctx.fillStyle = '#020202'; ctx.fillRect(0,0,1080,1350);
                // Border
                ctx.strokeStyle = '#27272a'; ctx.lineWidth = 20; ctx.strokeRect(40,40,1000,1270);
                // Header
                ctx.fillStyle = '#ffffff'; ctx.font = 'bold 80px Inter'; ctx.fillText('VIBE CHECK', 100, 180);
                ctx.font = 'italic 140px Playfair Display'; ctx.fillText(v.mood, 100, 350);
                // Content
                ctx.font = 'bold 30px Inter'; ctx.fillStyle = '#71717a'; ctx.fillText('ACTIVITY', 100, 450);
                ctx.fillStyle = '#ffffff'; ctx.font = '50px Inter'; ctx.fillText(v.activity, 100, 520);
                ctx.fillStyle = '#71717a'; ctx.font = 'bold 30px Inter'; ctx.fillText('SOUNDSCAPE', 100, 620);
                ctx.fillStyle = '#ffffff'; ctx.font = 'italic 50px Playfair Display'; ctx.fillText(v.music, 100, 690);
                // Deep Dive & Quote
                ctx.fillStyle = '#71717a'; ctx.font = 'bold 30px Inter'; ctx.fillText('REFLECTION', 100, 780);
                ctx.fillStyle = '#a1a1aa'; ctx.font = 'italic 35px Playfair Display'; 
                this.wrapText(ctx, `"${v.quote}" ${v.dive}`, 100, 850, 880, 50);
                // Palette
                v.colors.forEach((col, i) => { ctx.fillStyle = col; ctx.beginPath(); ctx.arc(140+(i*70), 1150, 30, 0, Math.PI*2); ctx.fill(); });
                // ID
                ctx.fillStyle = '#27272a'; ctx.font = '30px monospace'; ctx.fillText(`ID: ${v.id}`, 100, 1250);
                
                const link = document.createElement('a'); link.download = `vibe-${v.id}.png`; link.href = c.toDataURL(); link.click();
            },
            wrapText(ctx, text, x, y, maxWidth, lineHeight) {
                const words = text.split(' '); let line = '';
                for(let n=0; n<words.length; n++) {
                    const testLine = line + words[n] + ' ';
                    if (ctx.measureText(testLine).width > maxWidth && n > 0) { ctx.fillText(line, x, y); line = words[n] + ' '; y += lineHeight; } else { line = testLine; }
                } ctx.fillText(line, x, y);
            }
        };
        window.app = app; document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
