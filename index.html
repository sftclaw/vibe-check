<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Check</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --background: 0 0% 100%;
            --foreground: 240 10% 3.9%;
            --card: 0 0% 100%;
            --card-foreground: 240 10% 3.9%;
            --popover: 0 0% 100%;
            --popover-foreground: 240 10% 3.9%;
            --primary: 240 5.9% 10%;
            --primary-foreground: 0 0% 98%;
            --secondary: 240 4.8% 95.9%;
            --secondary-foreground: 240 5.9% 10%;
            --muted: 240 4.8% 95.9%;
            --muted-foreground: 240 3.8% 46.1%;
            --accent: 240 4.8% 95.9%;
            --accent-foreground: 240 5.9% 10%;
            --destructive: 0 84.2% 60.2%;
            --destructive-foreground: 0 0% 98%;
            --border: 240 5.9% 90%;
            --input: 240 5.9% 90%;
            --ring: 240 5.9% 10%;
            --radius: 0px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: hsl(var(--background));
            color: hsl(var(--foreground));
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 42rem;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: hsl(var(--muted-foreground));
            font-size: 1.125rem;
        }

        .mood-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .mood-btn {
            background: hsl(var(--background));
            border: 1px solid hsl(var(--border));
            padding: 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            text-align: center;
        }

        .mood-btn:hover {
            background: hsl(var(--accent));
            color: hsl(var(--accent-foreground));
        }

        .mood-btn.active {
            background: hsl(var(--primary));
            color: hsl(var(--primary-foreground));
            border-color: hsl(var(--primary));
        }

        .vibe-card {
            border: 1px solid hsl(var(--border));
            background: hsl(var(--card));
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            display: none;
        }

        .vibe-card.visible {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .vibe-section {
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid hsl(var(--border));
        }

        .vibe-section:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .vibe-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: hsl(var(--muted-foreground));
            margin-bottom: 0.5rem;
        }

        .vibe-content {
            font-size: 1rem;
            font-weight: 500;
        }

        .vibe-image {
            width: 100%;
            height: auto;
            display: block;
            margin-top: 0.75rem;
            border: 1px solid hsl(var(--border));
        }

        .color-palette {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        .color-swatch {
            width: 40px;
            height: 40px;
            border: 1px solid hsl(var(--border));
        }

        .actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 2rem;
        }

        .btn {
            flex: 1;
            background: hsl(var(--primary));
            color: hsl(var(--primary-foreground));
            border: 1px solid hsl(var(--primary));
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.15s ease;
            text-align: center;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn-secondary {
            background: hsl(var(--background));
            color: hsl(var(--foreground));
            border: 1px solid hsl(var(--border));
        }

        .btn-secondary:hover {
            background: hsl(var(--accent));
            color: hsl(var(--accent-foreground));
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: hsl(var(--muted-foreground));
            font-size: 0.875rem;
        }

        .error {
            background: hsl(0 93% 94%);
            color: hsl(0 74% 42%);
            border: 1px solid hsl(0 93% 90%);
            padding: 1rem;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Vibe Check</h1>
            <p>Select a mood to curate your experience</p>
        </div>
        
        <div class="error" id="error"></div>
        
        <div class="mood-grid" id="moodSelector">
            <button class="mood-btn" data-mood="happy">Happy</button>
            <button class="mood-btn" data-mood="chill">Chill</button>
            <button class="mood-btn" data-mood="energetic">Energetic</button>
            <button class="mood-btn" data-mood="melancholy">Melancholy</button>
            <button class="mood-btn" data-mood="creative">Creative</button>
        </div>
        
        <div class="vibe-card" id="vibeCard">
            <div class="loading" id="loading">Curating vibe...</div>
            
            <div class="vibe-section" id="activitySection" style="display:none;">
                <div class="vibe-label">Activity</div>
                <div class="vibe-content" id="activityText"></div>
            </div>
            
            <div class="vibe-section" id="musicSection" style="display:none;">
                <div class="vibe-label">Music</div>
                <div class="vibe-content" id="musicText"></div>
            </div>
            
            <div class="vibe-section" id="quoteSection" style="display:none;">
                <div class="vibe-label">Quote</div>
                <div class="vibe-content" id="quoteText"></div>
            </div>
            
            <div class="vibe-section" id="imageSection" style="display:none;">
                <div class="vibe-label">Visual</div>
                <img class="vibe-image" id="vibeImage" alt="Mood visual" />
            </div>
            
            <div class="vibe-section" id="colorSection" style="display:none;">
                <div class="vibe-label">Palette</div>
                <div class="color-palette" id="colorPalette"></div>
            </div>
        </div>
        
        <div class="actions">
            <button class="btn" onclick="generateVibe()">Regenerate</button>
            <button class="btn btn-secondary" onclick="shareVibe()">Share Link</button>
        </div>
    </div>

    <script>
        let currentVibe = null;
        let currentMood = null;

        const moodData = {
            happy: {
                activities: ['Go for a walk', 'Call a friend', 'Try a new recipe', 'Watch a comedy'],
                music: ['Upbeat Pop', 'Indie Folk', 'Dance Hits', 'Sunny Acoustic'],
                colors: ['#FCD34D', '#F87171', '#34D399', '#FBBF24', '#F472B6'],
                images: ['https://cataas.com/cat?type=square', 'https://place.dog/400/300']
            },
            chill: {
                activities: ['Read a book', 'Meditate', 'Make tea', 'Listen to lo-fi'],
                music: ['Lo-fi Hip Hop', 'Ambient', 'Jazz Café', 'Acoustic'],
                colors: ['#A7F3D0', '#D9F99D', '#FED7AA', '#FECACA', '#C7D2FE'],
                images: ['https://cataas.com/cat?type=square', 'https://place.dog/400/300']
            },
            energetic: {
                activities: ['Go for a run', 'Workout video', 'Dance', 'Start a project'],
                music: ['EDM', 'Rock Anthems', 'Hip-Hop', 'Workout Mix'],
                colors: ['#EF4444', '#FDBA74', '#FACC15', '#4ADE80', '#3B82F6'],
                images: ['https://cataas.com/cat?type=square', 'https://place.dog/400/300']
            },
            melancholy: {
                activities: ['Journaling', 'Watch the rain', 'Sad songs', 'Hot shower'],
                music: ['Indie Folk', 'Piano', 'Rain Sounds', 'Ambient'],
                colors: ['#818CF8', '#A78BFA', '#60A5FA', '#2DD4BF', '#C4B5FD'],
                images: ['https://cataas.com/cat?type=square', 'https://place.dog/400/300']
            },
            creative: {
                activities: ['Draw', 'Write a poem', 'Photography', 'Build something'],
                music: ['Experimental', 'Classical', 'World Music', 'Jazz Fusion'],
                colors: ['#F87171', '#34D399', '#22D3EE', '#FDBA74', '#6EE7B7'],
                images: ['https://cataas.com/cat?type=square', 'https://place.dog/400/300']
            }
        };

        async function fetchBoredActivity() {
            try {
                const res = await fetch('https://www.boredapi.com/api/activity');
                const data = await res.json();
                return data.activity || 'Something spontaneous';
            } catch (e) {
                return 'Take a moment for yourself';
            }
        }

        async function generateVibe() {
            const card = document.getElementById('vibeCard');
            const loading = document.getElementById('loading');
            const errorDiv = document.getElementById('error');
            
            errorDiv.style.display = 'none';
            card.classList.add('visible');
            loading.style.display = 'block';
            
            ['activitySection', 'musicSection', 'quoteSection', 'imageSection', 'colorSection'].forEach(id => {
                document.getElementById(id).style.display = 'none';
            });

            try {
                const mood = currentMood || Object.keys(moodData)[Math.floor(Math.random() * 5)];
                const theme = moodData[mood];

                const activity = await fetchBoredActivity();
                document.getElementById('activityText').textContent = activity;
                document.getElementById('activitySection').style.display = 'block';

                const musicGenre = theme.music[Math.floor(Math.random() * theme.music.length)];
                document.getElementById('musicText').textContent = musicGenre;
                document.getElementById('musicSection').style.display = 'block';

                const quotes = [
                    '"Be yourself; everyone else is already taken." — Oscar Wilde',
                    '"The only way to do great work is to love what you do." — Steve Jobs',
                    '"Life is what happens when you\'re busy making other plans." — John Lennon',
                    '"The future belongs to those who believe in the beauty of their dreams." — Eleanor Roosevelt'
                ];
                document.getElementById('quoteText').textContent = quotes[Math.floor(Math.random() * quotes.length)];
                document.getElementById('quoteSection').style.display = 'block';

                const imageUrl = theme.images[Math.floor(Math.random() * theme.images.length)];
                document.getElementById('vibeImage').src = imageUrl;
                document.getElementById('imageSection').style.display = 'block';

                const colors = theme.colors;
                const paletteDiv = document.getElementById('colorPalette');
                paletteDiv.innerHTML = '';
                colors.forEach(color => {
                    const swatch = document.createElement('div');
                    swatch.className = 'color-swatch';
                    swatch.style.backgroundColor = color;
                    paletteDiv.appendChild(swatch);
                });
                document.getElementById('colorSection').style.display = 'block';

                currentVibe = {
                    mood: mood,
                    activity: activity,
                    music: musicGenre,
                    colors: colors
                };

                // Update page title color subtly
                document.querySelector('.header h1').style.color = colors[0];

                loading.style.display = 'none';

            } catch (err) {
                console.error('Error:', err);
                errorDiv.textContent = 'Failed to load vibe. Try again.';
                errorDiv.style.display = 'block';
                loading.style.display = 'none';
            }
        }

        function shareVibe() {
            if (!currentVibe) {
                alert('Generate a vibe first');
                return;
            }

            const shareUrl = `${window.location.origin}${window.location.pathname}?mood=${currentVibe.mood}&activity=${encodeURIComponent(currentVibe.activity)}&music=${encodeURIComponent(currentVibe.music)}`;
            
            navigator.clipboard.writeText(shareUrl).then(() => {
                alert('Link copied');
            }).catch(() => {
                prompt('Copy this link:', shareUrl);
            });
        }

        document.querySelectorAll('.mood-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentMood = this.dataset.mood;
                generateVibe();
            });
        });

        function loadSharedVibe() {
            const params = new URLSearchParams(window.location.search);
            const mood = params.get('mood');
            const activity = params.get('activity');
            const music = params.get('music');

            if (mood && activity && music) {
                currentVibe = { mood, activity, music };
                currentMood = mood;
                
                document.querySelectorAll('.mood-btn').forEach(btn => {
                    if (btn.dataset.mood === mood) btn.classList.add('active');
                });

                document.getElementById('vibeCard').classList.add('visible');
                document.getElementById('loading').style.display = 'none';
                document.getElementById('activityText').textContent = activity;
                document.getElementById('activitySection').style.display = 'block';
                document.getElementById('musicText').textContent = music;
                document.getElementById('musicSection').style.display = 'block';
                
                const theme = moodData[mood];
                if (theme) {
                    document.querySelector('.header h1').style.color = theme.colors[0];
                }
            } else {
                generateVibe();
            }
        }

        window.addEventListener('DOMContentLoaded', loadSharedVibe);
    </script>
</body>
</html>
