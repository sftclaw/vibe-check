<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Check — Curated Experiences</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020202;
            --fg: #ffffff;
            --card-bg: #111111;
            --border: #27272a;
            --accent: #fafafa;
            --muted: #71717a;
            --success: #22c55e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            overflow-x: hidden;
        }

        #canvas-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.4; }

        .app-container { max-width: 500px; margin: 0 auto; padding: 3rem 1.5rem 8rem; position: relative; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem; }
        .header h1 { font-size: 1.75rem; font-weight: 800; letter-spacing: -0.05em; }
        
        .streak-badge {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            font-size: 0.75rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .streak-badge.fire { color: #f97316; border-color: #f97316; }

        .mood-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin-bottom: 2rem; }
        .mood-btn {
            background: var(--card-bg); border: 1px solid var(--border); color: var(--muted);
            padding: 0.75rem; font-size: 0.8rem; font-weight: 600; cursor: pointer;
            transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.05em;
        }
        .mood-btn:hover { border-color: var(--muted); color: var(--fg); }
        .mood-btn.active { background: var(--fg); color: var(--bg); border-color: var(--fg); }

        /* Vibe Card / Ticket Design */
        .vibe-ticket {
            background: var(--card-bg);
            border: 1px solid var(--border);
            margin-bottom: 1.5rem;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s;
            display: none;
        }
        .vibe-ticket.visible { display: block; animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        
        .ticket-header { padding: 1.5rem; border-bottom: 1px dashed var(--border); display: flex; justify-content: space-between; }
        .ticket-id { font-size: 0.65rem; color: var(--muted); font-family: monospace; }
        .ticket-mood { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.5rem; }
        
        .ticket-body { padding: 1.5rem; }
        .ticket-label { font-size: 0.65rem; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; letter-spacing: 0.1em; }
        .ticket-content { font-size: 1.1rem; font-weight: 500; margin-bottom: 1.5rem; line-height: 1.4; }
        
        .ticket-footer { padding: 1rem 1.5rem; background: rgba(255,255,255,0.02); display: flex; align-items: center; justify-content: space-between; }
        .palette-row { display: flex; gap: 0.25rem; }
        .mini-swatch { width: 20px; height: 20px; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(40px) rotateX(10deg); } to { opacity: 1; transform: translateY(0); } }

        /* Action Bar */
        .action-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 1rem; background: rgba(2,2,2,0.9); backdrop-filter: blur(10px);
            display: flex; gap: 1rem; justify-content: center; border-top: 1px solid var(--border);
        }
        .btn { flex: 1; padding: 1rem; border: none; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--card-bg); color: var(--fg); }
        .btn-primary { background: var(--fg); color: var(--bg); border-color: var(--fg); }
        .btn:active { transform: scale(0.98); }

        /* Hidden Canvas for Export */
        #export-canvas { display: none; }
    </style>
</head>
<body>
    <canvas id="canvas-bg"></canvas>

    <div class="app-container">
        <div class="header">
            <h1>VIBE CHECK</h1>
            <div class="streak-badge" id="streakBadge">
                <span>🔥</span> <span id="streakCount">0</span> Day Streak
            </div>
        </div>

        <div class="mood-grid" id="moodGrid">
            <button class="mood-btn" data-mood="happy">Happy</button>
            <button class="mood-btn" data-mood="chill">Chill</button>
            <button class="mood-btn" data-mood="energetic">Energetic</button>
            <button class="mood-btn" data-mood="melancholy">Melancholy</button>
            <button class="mood-btn" data-mood="creative">Creative</button>
        </div>

        <div id="vibeStage"></div>
    </div>

    <div class="action-bar">
        <button class="btn" onclick="app.regenerate()">🎲 New Vibe</button>
        <button class="btn btn-primary" onclick="app.exportCard()">📸 Save Card</button>
    </div>

    <canvas id="export-canvas" width="1080" height="1350"></canvas>

    <script>
        // --- Data & Config ---
        const moodData = {
            happy: {
                activities: ["Take a spontaneous 15-min walk", "Call that friend you miss", "Cook something with eggs", "Dance to your favorite song"],
                music: ["Upbeat Indie Pop", "70s Funk", "Sunny Acoustic"],
                colors: ["#facc15", "#f87171", "#4ade80", "#ffffff"],
                quote: "Happiness is not by chance, but by choice."
            },
            chill: {
                activities: ["Read 10 pages of a book", "Brew the perfect cup of tea", "5-minute guided meditation", "Listen to a vinyl record"],
                music: ["Lo-fi Hip Hop Beats", "Ambient Nature", "Slow Jazz"],
                colors: ["#4ade80", "#d9f99d", "#fed7aa", "#ffffff"],
                quote: "Quiet the mind, and the soul will speak."
            },
            energetic: {
                activities: ["20-minute HIIT session", "Clean your entire workspace", "Sprint for 100 meters", "Start that side project"],
                music: ["High-BPM Drum & Bass", "Rock Anthems", "Workout Trap"],
                colors: ["#ef4444", "#fdba74", "#facc15", "#ffffff"],
                quote: "Energy flows where attention goes."
            },
            melancholy: {
                activities: ["Write in a private journal", "Watch the rain from a window", "Listen to a sad album", "Take a long, hot shower"],
                music: ["Piano Solos", "Indie Folk", "Rain Sounds"],
                colors: ["#3b82f6", "#60a5fa", "#818cf8", "#ffffff"],
                quote: "Tears are words that need to be written."
            },
            creative: {
                activities: ["Sketch for 15 minutes", "Write a short haiku", "Take 5 abstract photos", "Build a blanket fort"],
                music: ["Experimental Electronic", "Baroque Classical", "World Fusion"],
                colors: ["#a855f7", "#c084fc", "#e879f9", "#ffffff"],
                quote: "Creativity is intelligence having fun."
            }
        };

        // --- Particle System ---
        class Particles {
            constructor() {
                this.c = document.getElementById('canvas-bg');
                this.ctx = this.c.getContext('2d');
                this.p = [];
                this.resize();
                window.addEventListener('resize', () => this.resize());
                this.animate();
            }
            resize() { this.c.width = window.innerWidth; this.c.height = window.innerHeight; }
            setMood(m) {
                const cfg = {
                    happy: { c: 100, s: 1.5, col: '#facc15' }, chill: { c: 50, s: 0.4, col: '#4ade80' },
                    energetic: { c: 150, s: 3.0, col: '#ef4444' }, melancholy: { c: 60, s: 0.5, col: '#60a5fa' },
                    creative: { c: 80, s: 1.2, col: '#c084fc' }
                }[m] || { c: 50, s: 0.5, col: '#fff' };
                
                this.p = [];
                for(let i=0; i<cfg.c; i++) {
                    this.p.push({ x: Math.random()*this.c.width, y: Math.random()*this.c.height, vx: (Math.random()-0.5)*cfg.s, vy: (Math.random()-0.5)*cfg.s, s: Math.random()*2 });
                }
                this.col = cfg.col;
            }
            animate() {
                this.ctx.clearRect(0,0,this.c.width, this.c.height);
                this.ctx.fillStyle = this.col;
                this.p.forEach(dot => {
                    dot.x += dot.vx; dot.y += dot.vy;
                    if(dot.x < 0 || dot.x > this.c.width) dot.vx *= -1;
                    if(dot.y < 0 || dot.y > this.c.height) dot.vy *= -1;
                    this.ctx.beginPath(); this.ctx.arc(dot.x, dot.y, dot.s, 0, Math.PI*2); this.ctx.fill();
                });
                requestAnimationFrame(() => this.animate());
            }
        }

        // --- Streak System ---
        const Streak = {
            get: () => parseInt(localStorage.getItem('vibe_streak') || '0'),
            inc: () => {
                const last = localStorage.getItem('last_check');
                const today = new Date().toDateString();
                if (last !== today) {
                    let s = Streak.get();
                    const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
                    if (last === yesterday.toDateString()) s++; else s = 1;
                    localStorage.setItem('vibe_streak', s);
                    localStorage.setItem('last_check', today);
                    document.getElementById('streakBadge').classList.add('fire');
                }
                document.getElementById('streakCount').textContent = Streak.get();
            }
        };

        // --- Main App ---
        const app = {
            particles: new Particles(),
            currentMood: 'chill',
            currentVibe: null,

            init() {
                document.querySelectorAll('.mood-btn').forEach(b => {
                    b.addEventListener('click', e => this.setMood(e.target.dataset.mood));
                });
                Streak.inc();
                this.setMood('chill');
            },

            setMood(m) {
                this.currentMood = m;
                document.querySelectorAll('.mood-btn').forEach(b => b.classList.toggle('active', b.dataset.mood === m));
                this.particles.setMood(m);
                this.regenerate();
            },

            regenerate() {
                const d = moodData[this.currentMood];
                this.currentVibe = {
                    mood: this.currentMood,
                    activity: d.activities[Math.floor(Math.random() * d.activities.length)],
                    music: d.music[Math.floor(Math.random() * d.music.length)],
                    colors: d.colors,
                    quote: d.quote,
                    id: Math.random().toString(36).substring(2, 8).toUpperCase()
                };

                const stage = document.getElementById('vibeStage');
                stage.innerHTML = `
                    <div class="vibe-ticket visible">
                        <div class="ticket-header">
                            <div class="ticket-mood">${this.currentVibe.mood}</div>
                            <div class="ticket-id">#${this.currentVibe.id}</div>
                        </div>
                        <div class="ticket-body">
                            <div class="ticket-label">Activity</div>
                            <div class="ticket-content">${this.currentVibe.activity}</div>
                            <div class="ticket-label">Soundscape</div>
                            <div class="ticket-content" style="font-family:'Playfair Display',serif; font-style:italic">${this.currentVibe.music}</div>
                            <div class="ticket-label">Mantra</div>
                            <div class="ticket-content" style="font-size:0.9rem; color:var(--muted)">"${this.currentVibe.quote}"</div>
                        </div>
                        <div class="ticket-footer">
                            <div class="palette-row">
                                ${this.currentVibe.colors.map(c => `<div class="mini-swatch" style="background:${c}"></div>`).join('')}
                            </div>
                            <div style="font-size:0.7rem; color:var(--muted)">vibecheck.app</div>
                        </div>
                    </div>
                `;
            },

            exportCard() {
                const c = document.getElementById('export-canvas');
                const ctx = c.getContext('2d');
                
                // Background
                ctx.fillStyle = '#111'; ctx.fillRect(0,0,1080,1350);
                
                // Border
                ctx.strokeStyle = '#333'; ctx.lineWidth = 10; ctx.strokeRect(50,50,980,1250);
                
                // Text
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 80px Inter'; ctx.fillText('VIBE CHECK', 100, 150);
                ctx.font = 'italic 120px Playfair Display'; ctx.fillText(this.currentVibe.mood, 100, 300);
                
                ctx.font = '40px Inter'; ctx.fillStyle = '#888';
                ctx.fillText(`ACTIVITY: ${this.currentVibe.activity}`, 100, 450);
                ctx.fillText(`SOUND: ${this.currentVibe.music}`, 100, 550);
                ctx.fillText(`"${this.currentVibe.quote}"`, 100, 700);
                
                // Palette
                this.currentVibe.colors.forEach((col, i) => {
                    ctx.fillStyle = col; ctx.fillRect(100 + (i*80), 900, 60, 60);
                });

                // ID
                ctx.fillStyle = '#444'; ctx.font = '30px monospace';
                ctx.fillText(`#${this.currentVibe.id}`, 100, 1200);

                // Download
                const link = document.createElement('a');
                link.download = `vibe-${this.currentVibe.id}.png`;
                link.href = c.toDataURL();
                link.click();
            }
        };

        window.app = app;
        document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
